<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>GTS – Mobile (virages à 20s, sans carte)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111" />
  <style>
    :root {
      --ok: #0a7a0a; --ko: #b00020; --fg: #111; --bg: #fff; --fg-night: #eee; --bg-night: #111;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg); background: var(--bg);
      display: flex; flex-direction: column;
    }
    .night { color: var(--fg-night); background: var(--bg-night); }
    header { padding: 10px 14px; font-weight: 600; }
    .panel { padding: 10px 14px; display: grid; grid-template-columns: 1fr; gap: 6px; }
    .row { font-size: 16px; line-height: 1.3; }
    .ok { color: var(--ok); font-weight: 700; }
    .ko { color: var(--ko); font-weight: 700; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; padding: 8px 14px; }
     button {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #0078ff;
      color: white;
      cursor: pointer;
    }
    /*.night button { background: #1e1e1e; color: #eee; border-color: #333; }*/
    .icon-wrap {
      flex: 1 1 auto;
      display:flex; align-items:center; justify-content:center;
      padding: 8px 14px;
    }
    #icon {
      display: block;
      height: min(42vh, 280px);
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
    }
    footer { padding: 10px 14px; color:#666; font-size: 13px; }
    .night footer { color:#aaa; }
    #next, #speed, #status { font-size: 30px; }
    * { -webkit-tap-highlight-color: transparent; user-select: none; }
  </style>
</head>

<body onload="document.body.classList.add('night')">

<body>
  <header>GTS – Mobile (virages à 20 s)</header>

  <div class="panel">
    <div class="row"><strong id="wsState">GPS natif</strong></div>
    <div class="row">Statut : <span id="status" class="ko">En attente…</span></div>
    <div class="row">Vitesse : <strong><span id="speed">-- km/h</span></strong></div>
    <div class="row">Prochain : <strong><span id="next">—</span></strong></div>
  </div>

  <div class="icon-wrap">
    <img id="icon" src="images/droit.png" alt="Direction">
  </div>

  <div class="controls">
    <button onclick="startTracking()">Démarrer</button>
    <button onclick="stopTracking()">Arrêter</button>
    <button onclick="toggleNight()">Mode nuit</button>
  </div>

  <footer>Engine PRO v4 coelod v0.2.7</footer>

 <script>
/***************************************************
 *  CIRCLE ENGINE PRO v4
 *  - Multi entries[]
 *  - Multi inside[]
 *  - Multi exits[]
 *  - Icônes dynamiques par secteur
 *  - Système overlap autorisé
 *  - Machine d’état PRO v3 (approche → entry → inside → exit)
 *  - Anti‑jitter, deadband, tendance réelle, hystérésis
 *  - Vitesse / cap / ETA
 ***************************************************/

/* ============================================
   UI HELPERS
============================================ */
const qs = sel => document.querySelector(sel);

function setIcon(src) { qs('#icon').src = src; }

function setStatus(txt, cls) {
  const el = qs('#status');
  el.textContent = txt;
  el.className = cls === "ok" ? "ok" : "ko";
}

function setSpeed(kmh) {
  qs('#speed').textContent =
    isFinite(kmh) ? `${kmh.toFixed(0)} km/h` : "-- km/h";
}

/* ============================================
   GEO UTILS
============================================ */
const DEG = Math.PI / 180;
const R   = 6371000;

function distanceMeters(lat1, lon1, lat2, lon2) {
  const dLat = (lat2 - lat1) * DEG;
  const dLon = (lon2 - lon1) * DEG;
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*DEG) * Math.cos(lat2*DEG) *
    Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * DEG;
  lat1 *= DEG; lat2 *= DEG;
  const y = Math.sin(dLon) * Math.cos(lat2);
  const x =
    Math.cos(lat1)*Math.sin(lat2) -
    Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}

function normalize180(a) {
  return ((a + 180) % 360 + 360) % 360 - 180;
}

/* ============================================
   CIRCLE CONFIG (À PERSONNALISER)
============================================ */
/*
 * Structure possible :
 *
 * {
 *   name: "zone1",
 *   lat:  ..., lng: ..., radius: 25,
 *
 *   entries: [
 *     { min: 80, max: 160, icon: "images/entree_SE.png" },
 *     { min: 250, max: 310, icon: "images/entree_NO.png" }
 *   ],
 *
 *   inside: [
 *     { min: 0, max: 90, icon: "images/inside_NE.png" },
 *     { min: 90, max:180, icon: "images/inside_SE.png" }
 *   ],
 *
 *   exits: [
 *     { min: 200, max: 260, icon: "images/sortie_SO.png" }
 *   ],
 *
 *   iconApproach: "images/approche.png",
 *   iconEntry:    "images/entree.png",
 *   iconInside:   "images/zone.png",
 *   iconExit:     "images/sortie.png"
 * }
 */

const circles = [
   // === EXEMPLES, à remplacer par les tiens ===
  // { name: "rondpoint_test", lat: 48.29589, lng: -0.92670, radius: 50},
   {
	 name: "Bifurcation", lat: 48.21999, lng: -1.09198, radius: 120, 
	 entries: [
	 {min: 130, max: 160, icon: "images/gauche.png"},
	 {min: 280, max: 310, icon: "images/droite.png"}
	 ],
	 exits: [
	 {min: 130, max: 160, icon: "images/50.png"}
	 ],
	 iconApproach: "images/danger.png",
     iconInside:   "images/30.png",
     iconExit:     "images/droit.png"
	 },
	 
	{
	 name: "rond point paris", lat: 48.29589, lng: -0.92670, radius: 50,
	 iconApproach: "images/rond.png",
     iconEntry:    "images/danger.png",
     iconInside:   "images/rond.png",
     iconExit:     "images/50.png"
	},
	 
	 {name: "rond point cerf", lat: 48.29000, lng: -0.52670,  radius: 70, iconApproach: "images/danger.png", iconEntry: "images/rond.png", iconInside: "images/rond.png", iconExit: "images/pietons.png"},
	 {name: "feu", lat: 48.29694, lng: -0.93666, radius: 60, iconApproach: "images/feu.png", iconEntry: "images/danger.png", iconInside: "images/30.png", iconExit: "images/pietons.png"},
	 {name: "Rond Point Belle Epoque", lat: 48.29768, lng: -0.93474, radius: 60},
	 
	 {name: "direction vitré", lat: 48.29702, lng: -0.93928, radius: 80},
	 {name: "deviation chailland", lat: 48.28065, lng: -0.96229, radius: 200},
	 {
	  name: "deviation st pierre", lat: 48.264291, lng: -0.985782, radius: 200,
	 entries: [
	 {min: 33, max: 53, icon: "images/droite.png"},
	 {min: 292, max: 312, icon: "images/gauche.png"},
	 {min: 213, max: 233, icon: "images/gauche.png"}
	 ],
	 inside: [
	 {min: 33, max: 53, icon: "images/droite.png"},
	 {min: 292, max: 312, icon: "images/gauche.png"},
	 {min: 213, max: 233, icon: "images/gauche.png"}
	 ],
	 
	 iconApproach: "images/danger.png",
     iconExit:     "images/80.png"
	 },
	 {name: "contour juvigne", lat: 48.24223, lng: -1.01691, radius: 200}
	 
];

/* ============================================
   SECTOR HELPERS (entrée, inside, sortie)
============================================ */

// secteurs overlap autorisés (ton choix)
function inSector(h, min, max) {
  h = ((h % 360) + 360) % 360;
  if (min <= max) return h >= min && h <= max;
  return (h >= min || h <= max);  // traverse 0°
}

function getMatchedEntry(circle, heading) {
  if (!circle.entries) return null;
  for (const e of circle.entries) {
    if (inSector(heading, e.min, e.max)) return e;
  }
  return null;
}

function getMatchedInside(circle, heading) {
  if (!circle.inside) return null;
  for (const s of circle.inside) {
    if (inSector(heading, s.min, s.max)) return s;
  }
  return null;
}

function getMatchedExit(circle, heading) {
  if (!circle.exits) return null;
  for (const e of circle.exits) {
    if (inSector(heading, e.min, e.max)) return e;
  }
  return null;
}

/* ============================================
   ENGINE HELPERS
============================================ */
function circleDist(c, pos) {
  return distanceMeters(c.lat, c.lng, pos.lat, pos.lng);
}

function circleETA(c, pos, speedKmh) {
  const v = speedKmh / 3.6;
  if (v < 0.4) return Infinity;
  const d = circleDist(c,pos) - c.radius;
  return d > 0 ? d/v : 0;
}

function isApproachingCircle(c, pos, prevPos) {
  if (!prevPos) return false;
  const d1 = circleDist(c, prevPos);
  const d2 = circleDist(c, pos);
  return d2 < d1 - 1.2; // approche réelle
}

/* ============================================
   ENGINE STATE
============================================ */
let circState = "IDLE";
let circCurrent = null;
let circSuppress = { until: 0, name: null };

let lastPos = null;
let prevPos = null;
let lastFixTs = null;
let lastSpeed = 0;
let lastHeading = null;

let filteredPos = null;

/* deadband anti-jitter */
function filterPos(p) {
  if (!filteredPos) { filteredPos = p; return p; }
  const d = distanceMeters(filteredPos.lat, filteredPos.lng, p.lat, p.lng);
  if (d < 3) return filteredPos;
  filteredPos = p;
  return p;
}

function smoothSpeed(s) {
  lastSpeed = lastSpeed*0.6 + s*0.4;
  return lastSpeed;
}

/* ============================================
   GPS PROCESSING — CIRCLES ONLY
============================================ */
function processGps(gps) {

  /* heading */
  if (isFinite(gps.heading))
    lastHeading = (gps.heading + 360) % 360;
  else if (prevPos) {
    const hdg = bearing(prevPos.lat, prevPos.lng, gps.lat, gps.lng);
    if (isFinite(hdg)) lastHeading = hdg;
  }

  /* speed */
  const now = Date.now();
  if (isFinite(gps.speedKmh))
    setSpeed(smoothSpeed(gps.speedKmh));
  else if (lastPos && lastFixTs) {
    const dt = (now-lastFixTs)/1000;
    const d  = distanceMeters(lastPos.lat,lastPos.lng,gps.lat,gps.lng);
    const v  = dt>0 ? d/dt : 0;
    setSpeed(smoothSpeed(Math.min(v,80)*3.6));
  }

  prevPos   = lastPos;
  lastPos   = filterPos({ lat:gps.lat, lng:gps.lng });
  lastFixTs = now;

  const pos   = lastPos;
  const vKmh  = lastSpeed;
  const hdg   = lastHeading ?? 0;

  if (vKmh < 3) {
    setStatus("Attente mouvement…", "ko");
    setIcon("images/50.png");
    return;
  }

  /* ============================================
     MACHINE D'ÉTAT CERCLES
  ============================================= */

  /* ========== IDLE ========== */
  if (circState === "IDLE") {
    let best = null;

    for (const c of circles) {
      if (Date.now() < circSuppress.until && circSuppress.name === c.name)
        continue;

      const dist = circleDist(c,pos);
      const eta  = circleETA(c,pos,vKmh);

      if (dist < c.radius + 120 &&
          isApproachingCircle(c,pos,prevPos)) {

        if (!best || eta < best.eta)
          best = { circle:c, dist, eta };
      }
    }

    if (best) {
      circCurrent = best.circle;
      circState   = "APPROACH";

      const e = getMatchedEntry(circCurrent, hdg);
      if (e && e.icon) setIcon(e.icon);
      else setIcon(circCurrent.iconApproach || "images/approche.png");

      setStatus(`Approche "${circCurrent.name}"`, "ok");
      qs("#next").textContent = `${Math.round(best.dist)} m • ${Math.round(best.eta)} s`;
      return;
    }

    setStatus("Aucune zone proche", "ko");
    setIcon("images/droit.png");
    qs("#next").textContent = "—";
    return;
  }

  /* ========== APPROACH ========== */
  if (circState === "APPROACH") {

    const dist = circleDist(circCurrent,pos);

    if (!isApproachingCircle(circCurrent,pos,prevPos)) {
      circState = "IDLE";
      return;
    }

    if (dist <= circCurrent.radius + 5) {
      circState = "ENTRY";

      const e = getMatchedEntry(circCurrent, hdg);
      if (e && e.icon) setIcon(e.icon);
      else setIcon(circCurrent.iconEntry || "images/entree.png");

      setStatus(`Entrée "${circCurrent.name}"`, "ok");
      qs("#next").textContent = "—";
      return;
    }

    const e = getMatchedEntry(circCurrent, hdg);
    if (e && e.icon) setIcon(e.icon);
    else setIcon(circCurrent.iconApproach || "images/approche.png");

    setStatus(`Approche "${circCurrent.name}"`, "ok");
    qs("#next").textContent = `${Math.round(dist)} m`;
    return;
  }

  /* ========== ENTRY → INSIDE ========== */
  if (circState === "ENTRY") {
    circState = "INSIDE";

    const s = getMatchedInside(circCurrent, hdg);
    if (s && s.icon) setIcon(s.icon);
    else setIcon(circCurrent.iconInside || "images/zone.png");

    setStatus(`Dans "${circCurrent.name}"`, "ok");
    qs("#next").textContent = "—";
    return;
  }

  /* ========== INSIDE ========== */
  if (circState === "INSIDE") {

    const dist  = circleDist(circCurrent,pos);
    const dPrev = circleDist(circCurrent, prevPos ?? pos);
    const trend = dist - dPrev;

    const s = getMatchedInside(circCurrent, hdg);
    if (s && s.icon) setIcon(s.icon);
    else setIcon(circCurrent.iconInside || "images/zone.png");

    if (trend > 0.8 && dist > circCurrent.radius + 12) {

      const x = getMatchedExit(circCurrent, hdg);
      if (x && x.icon) setIcon(x.icon);
      else setIcon(circCurrent.iconExit || "images/sortie.png");

      circState = "EXIT";
      circSuppress = { until: Date.now()+3000, name: circCurrent.name };
      setStatus(`Sortie "${circCurrent.name}"`, "ok");
      return;
    }

    setStatus(`Dans "${circCurrent.name}"`, "ok");
    qs("#next").textContent = `${Math.round(dist)} m`;
    return;
  }

  /* ========== EXIT ========== */
  if (circState === "EXIT") {
    circState = "IDLE";
    circCurrent = null;
    qs("#next").textContent = "—";
    return;
  }
}

/* ============================================
   GPS API
============================================ */
let watchId = null;

function startTracking() {
  if (!navigator.geolocation) {
    setStatus("GPS non supporté", "ko");
    return;
  }

  setStatus("Acquisition GPS…", "ok");

  watchId = navigator.geolocation.watchPosition(
    pos => {
      processGps({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        speedKmh: pos.coords.speed != null ? pos.coords.speed*3.6 : null,
        heading: pos.coords.heading
      });
    },
    err => setStatus("Erreur GPS : " + err.message, "ko"),
    { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
  );
}

function stopTracking() {
  if (watchId != null) navigator.geolocation.clearWatch(watchId);
  watchId = null;

  setStatus("GPS arrêté", "ko");
  qs("#next").textContent = "—";
  setIcon("images/droit.png");
}

</script>
</body>
</html>
