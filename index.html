<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>GTS – Mobile (virages à 20s, sans carte)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111" />
  <style>
    :root {
      --ok: #0a7a0a; --ko: #b00020; --fg: #111; --bg: #fff; --fg-night: #eee; --bg-night: #111;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg); background: var(--bg);
      display: flex; flex-direction: column;
    }
    .night { color: var(--fg-night); background: var(--bg-night); }
    header { padding: 10px 14px; font-weight: 600; }
    .panel { padding: 10px 14px; display: grid; grid-template-columns: 1fr; gap: 6px; }
    .row { font-size: 16px; line-height: 1.3; }
    .ok { color: var(--ok); font-weight: 700; }
    .ko { color: var(--ko); font-weight: 700; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; padding: 8px 14px; }
    button {
      padding: 10px 14px; font-size: 16px;
      border-radius: 10px; border: 1px solid #ccc;
      background: #f5f5f5; color: #222;
    }
    .night button { background: #1e1e1e; color: #eee; border-color: #333; }
    .icon-wrap {
      flex: 1 1 auto;
      display:flex; align-items:center; justify-content:center;
      padding: 8px 14px;
    }
    #icon {
      display: block;
      height: min(42vh, 280px);
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
    }
    footer { padding: 10px 14px; color:#666; font-size: 13px; }
    .night footer { color:#aaa; }
    #next, #speed, #status { font-size: 30px; }
    * { -webkit-tap-highlight-color: transparent; user-select: none; }
  </style>
</head>
<body>
  <header>GTS – Mobile (virages à 20 s)</header>

  <div class="panel">
    <div class="row"><strong id="wsState">GPS natif</strong></div>
    <div class="row">Statut : <span id="status" class="ko">En attente…</span></div>
    <div class="row">Vitesse : <strong><span id="speed">-- km/h</span></strong></div>
    <div class="row">Prochain : <strong><span id="next">—</span></strong></div>
  </div>

  <div class="icon-wrap">
    <img id="icon" src="images/droit.png" alt="Direction">
  </div>

  <div class="controls">
    <button onclick="startTracking()">Démarrer</button>
    <button onclick="stopTracking()">Arrêter</button>
    <button onclick="toggleNight()">Mode nuit</button>
  </div>

  <footer>Sans carte, uniquement paths &amp; virages. Lookahead robuste, anti‑clignotement.</footer>

  <script>

/* ============================================================
   UI HELPERS (inchangé)
   ============================================================ */

const qs = (sel) => document.querySelector(sel);

function setIcon(src) { qs('#icon').src = src; }

function setStatus(txt, cls) {
    const el = qs('#status');
    el.textContent = txt;
    el.className = cls === "ok" ? "ok" : "ko";
}

function setSpeed(kmh) {
    qs('#speed').textContent =
        isFinite(kmh) ? `${kmh.toFixed(0)} km/h` : "-- km/h";
}

function toggleNight() {
    document.body.classList.toggle('night');
}

/* ============================================================
   GEO UTILS
   ============================================================ */

const DEG = Math.PI / 180;
const R = 6371000;

function distanceMeters(lat1, lon1, lat2, lon2) {
    const dLat = (lat2 - lat1) * DEG;
    const dLon = (lon2 - lon1) * DEG;
    const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * DEG) * Math.cos(lat2 * DEG) *
        Math.sin(dLon / 2) ** 2;

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function bearing(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * DEG;
    const l1 = lat1 * DEG;
    const l2 = lat2 * DEG;

    const y = Math.sin(dLon) * Math.cos(l2);
    const x =
        Math.cos(l1) * Math.sin(l2) -
        Math.sin(l1) * Math.cos(l2) * Math.cos(dLon);

    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function normalize180(a) {
    return ((a + 180) % 360 + 360) % 360 - 180;
}

function angleDiff(a, b) {
    let d = ((a - b + 540) % 360) - 180;
    return d;
}

/* ============================================================
   CIRCLE ENGINE PRO – Option 3 (COMPLET)
   ============================================================ */

/*
   FORMAT A attendu :
   const circles = [
       {
         name: "rondpoint_superu",
         lat: 48.1234,
         lng: -1.2345,
         radius: 25,

         // OPTIONNEL → Zones directionnelles (en degrés)
         entryMin:  80,   // entrée autorisée dès 80°
         entryMax: 160,   // entrée jusqu'à 160°
         exitMin:  200,
         exitMax: 260
       }
	   
   ];
*/

const circles = [
   // === EXEMPLES, à remplacer par les tiens ===
  // { name: "rondpoint_test", lat: 48.29589, lng: -0.92670, radius: 50},
   
	 
	 {name: "rond point cerf", lat: 48.29000, lng: -0.52670,  radius: 70},
	 {name: "feu", lat: 48.29694, lng: -0.93666, radius: 60},
	 {name: "Rond Point Belle Epoque", lat: 48.29768, lng: -0.93474, radius: 60},
	 {name: "rond point paris", lat: 48.29589, lng: -0.92670, radius: 50},
	 {name: "direction vitré", lat: 48.29702, lng: -0.93928, radius: 80},
	 {name: "deviation chailland", lat: 48.28065, lng: -0.96229, radius: 200},
	 {name: "deviation st pierre", lat: 48.26329, lng: -0.98710, radius: 200},
	 {name: "contour juvigne", lat: 48.24223, lng: -1.01691, radius: 200},
	 {name: "Bifurcation", lat: 48.22070, lng: -1.09284, radius: 120}
];

/* ---- Calcul distance au centre ---- */
function circleDistance(c, pos) {
    return distanceMeters(c.lat, c.lng, pos.lat, pos.lng);
}

/* ---- Vitesse / ETA ---- */
function circleETA(c, pos, speedKmh) {
    const v = Math.max(0, speedKmh / 3.6);
    if (v < 0.3) return Infinity;

    const d = circleDistance(c, pos) - c.radius;
    return d > 0 ? d / v : 0;
}

/* ---- Vérifie entrée directionnelle (optionnelle) ---- */
function isDirectionalEntryAllowed(c, heading) {
    if (c.entryMin == null) return true;

    const h = heading % 360;
    return (
        (c.entryMin <= c.entryMax && h >= c.entryMin && h <= c.entryMax) ||
        (c.entryMin > c.entryMax  && (h >= c.entryMin || h <= c.entryMax))
    );
}

/* ---- Vérifie sortie directionnelle ---- */
function isDirectionalExitAllowed(c, heading) {
    if (c.exitMin == null) return true;

    const h = heading % 360;
    return (
        (c.exitMin <= c.exitMax && h >= c.exitMin && h <= c.exitMax) ||
        (c.exitMin > c.exitMax  && (h >= c.exitMin || h <= c.exitMax))
    );
}

let activeCircle = null;
let suppress = { until: 0, name: null };

/* ---- Détection du prochain cercle utile ---- */
function detectUpcomingCircle(pos, speedKmh, heading) {
    let best = null;

    for (const c of circles) {

        if (Date.now() < suppress.until && suppress.name === c.name)
            continue;

        const dist = circleDistance(c, pos);
        const eta  = circleETA(c, pos, speedKmh);

        // On ignore si trop proche du centre
        if (dist < c.radius - 5) continue;

        // Vérifie si on se dirige vers la zone d'entrée
        if (!isDirectionalEntryAllowed(c, heading)) continue;

        if (!best || eta < best.eta)
            best = { circle: c, dist, eta };
    }

    return best;
}

/* ============================================================
   GPS + LOGIQUE TEMPS RÉEL
   ============================================================ */

let lastPos = null;
let prevPos = null;
let lastFixTs = null;
let lastSpeed = 0;
let lastHeading = null;

/* ---- Lissage vitesse ---- */
function smoothSpeed(s) {
    lastSpeed = lastSpeed * 0.6 + s * 0.4;
    return lastSpeed;
}

/* ---- TRAITEMENT GPS ---- */
function processGps(gps) {

    /* --- MAJ cap --- */
    if (isFinite(gps.heading)) {
        lastHeading = (gps.heading + 360) % 360;
    } else if (prevPos) {
        const hdg = bearing(prevPos.lat, prevPos.lng, gps.lat, gps.lng);
        if (isFinite(hdg)) lastHeading = hdg;
    }

    /* --- MAJ vitesse --- */
    const now = Date.now();

    if (isFinite(gps.speedKmh)) {
        setSpeed(smoothSpeed(gps.speedKmh));
    } else if (lastPos && lastFixTs) {
        const dt = (now - lastFixTs) / 1000;
        const d  = distanceMeters(lastPos.lat, lastPos.lng, gps.lat, gps.lng);
        const v  = dt > 0 ? d / dt : 0;
        setSpeed(smoothSpeed(Math.min(v, 80) * 3.6));
    }

    prevPos    = lastPos;
    lastPos    = { lat: gps.lat, lng: gps.lng };
    lastFixTs  = now;

    const pos = lastPos;
    const vKmh = lastSpeed;
    const hdg = lastHeading ?? 0;

    /* ====================================================
       1) Si un cercle est actif → gérer entrée/sortie
       ==================================================== */
    if (activeCircle) {

        const dist = circleDistance(activeCircle, pos);

        // → sortie ?
        if (dist > activeCircle.radius + 10) {

            // Vérifie si sortie directionnelle OK
            if (isDirectionalExitAllowed(activeCircle, hdg)) {

                setStatus(
                    `Sorti de la zone "${activeCircle.name}"`,
                    'ok'
                );
                setIcon("images/sortie.png");

                suppress = {
                    until: Date.now() + 4000,
                    name : activeCircle.name
                };

                activeCircle = null;
                qs("#next").textContent = "—";
                return;
            }
        }

        // Sinon on est dedans
        setStatus(`Dans "${activeCircle.name}"`, 'ok');
        setIcon("images/zone.png");
        qs("#next").textContent = `${Math.round(dist)} m`;
        return;
    }

    /* ====================================================
       2) Aucun cercle actif → détecter une approche
       ==================================================== */

    const next = detectUpcomingCircle(pos, vKmh, hdg);

    if (next) {
        const c = next.circle;

        activeCircle = c;

        setStatus(
            `Approche "${c.name}"`, // (~${Math.round(next.dist)} m, ~${Math.round(next.eta)} s),
            'ok'
        );
        setIcon("images/danger.png");

        qs('#next').textContent =
            `${Math.round(next.dist)} m • ${Math.round(next.eta)} s`;

        return;
    }

    /* ====================================================
       3) Aucune zone utile
       ==================================================== */
    setStatus("Aucune zone détectée", "ko");
    setIcon("images/droit.png");
    qs('#next').textContent = "—";
}


/* ============================================================
   GPS REAL API
   ============================================================ */

let watchId = null;

function startTracking() {
    if (!navigator.geolocation) {
        setStatus("GPS non supporté", "ko");
        return;
    }

    setStatus("Acquisition GPS…", "ok");

    watchId = navigator.geolocation.watchPosition(
        (pos) => {
            const c = pos.coords;
            processGps({
                lat: c.latitude,
                lng: c.longitude,
                speedKmh: (c.speed != null ? c.speed * 3.6 : null),
                heading: c.heading
            });
        },
        (err) => setStatus("Erreur GPS : " + err.message, "ko"),
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );
}

function stopTracking() {
    if (watchId !== null)
        navigator.geolocation.clearWatch(watchId);

    watchId = null;
    setStatus("GPS arrêté", "ko");
    qs("#next").textContent = "—";
    setIcon("images/droit.png");
}

</script>
</body>
</html>
