/* ============================
   ICÔNES DIRECTIONNELLES
   ============================ */
const iconLeft  = "images/gauche.png";
const iconRight = "images/droite.png";

/* ============================
   ÉTAT GLOBAL
   ============================ */
let map = null;
let watchId = null;
let lastZoneName = null;
let lastPos = null;       // {lat, lng}
let lastSpeed = 0;        // m/s lissé
let arrivalTimeoutId = null;

/* ============================
   OUTILS TEMPS / DISTANCE
   ============================ */
function getTimingStatus(expectedTime) {
  const now = new Date();
  const [h, m] = expectedTime.split(":").map(Number);
  const expected = new Date();
  expected.setHours(h, m, 0, 0);

  const diffMs = now - expected;
  const diffMin = Math.round(diffMs / 60000);

  if (diffMin < 0) return { status: "en avance", minutes: Math.abs(diffMin) };
  if (diffMin > 0) return { status: "en retard", minutes: diffMin };
  return { status: "à l'heure", minutes: 0 };
}

function distanceMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function polygonCentroid(points) {
  let lat = 0, lng = 0;
  for (const p of points) { lat += p.lat; lng += p.lng; }
  return { lat: lat / points.length, lng: lng / points.length };
}

/* ============================
   BEARING (DIRECTION)
   ============================ */
function bearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * Math.PI / 180;
  lat1 *= Math.PI / 180;
  lat2 *= Math.PI / 180;

  const y = Math.sin(dLon) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) -
            Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);

  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function bearingToText(b) {
  // 0°=Nord, 90°=Est, 180°=Sud, 270°=Ouest
  if (b >= 45 && b < 135) return "Est";
  if (b >= 135 && b < 225) return "Sud";
  if (b >= 225 && b < 315) return "Ouest";
  return "Nord";
}

/* ============================
   POINT DANS POLYGONE
   ============================ */
function isPointInPolygon(lat, lng, polygon) {
  // Ray casting (x=lat, y=lng)
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].lat, yi = polygon[i].lng;
    const xj = polygon[j].lat, yj = polygon[j].lng;

    const intersect = ((yi > lng) !== (yj > lng)) &&
                      (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

/* ============================
   MODE NUIT
   ============================ */
function toggleNightMode() {
  document.body.classList.toggle("night");
}

/* ============================
   VITESSE LISSEE
   ============================ */
function smoothSpeed(s) {
  if (s === null || isNaN(s)) return lastSpeed;
  lastSpeed = lastSpeed * 0.6 + s * 0.4;
  return lastSpeed;
}

/* ============================
   UI HELPERS
   ============================ */
function setIconBox(src, alt = "") {
  const iconBox = document.getElementById("icon");
  if (!iconBox) return;
  const safeSrc = src || "images/none.png";
  iconBox.innerHTML = `<img src="${safeSrc}" alt="${alt}" style="height:48px;vertical-align:middle">`;
}

/* ============================
   FLÈCHES SUR LES CHEMINS
   (nécessite libraries=geometry)
   ============================ */
function addDirectionIcons(path, mapInstance) {
  if (!window.google || !google.maps || !google.maps.geometry) {
    console.warn("[GTS] google.maps.geometry indisponible – flèches non tracées (ajoute libraries=geometry).");
    return;
  }

  for (let i = 1; i < path.length - 1; i++) {
    const prev = path[i - 1];
    const curr = path[i];
    const next = path[i + 1];

    const h1 = google.maps.geometry.spherical.computeHeading(prev, curr);
    const h2 = google.maps.geometry.spherical.computeHeading(curr, next);

    let diff = h2 - h1;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;

    const icon = diff > 0 ? iconRight : iconLeft;

    new google.maps.Marker({
      position: curr,
      map: mapInstance,
      icon: {
        url: icon,
        scaledSize: new google.maps.Size(32, 32)
      }
    });
  }
}

/* ============================
   AFFICHAGE CARTE
   ============================ */
function drawZonesOnMap(mapInstance) {
  if (!window.google || !google.maps) return;

  zones.forEach(z => {
    if (z.type === "circle") {
      new google.maps.Circle({
        map: mapInstance,
        center: { lat: z.lat, lng: z.lng },
        radius: z.radius,
        strokeColor: "#1e90ff",
        strokeOpacity: 0.9,
        strokeWeight: 2,
        fillColor: "#1e90ff",
        fillOpacity: 0.15
      });

      if (z.icon) {
        new google.maps.Marker({
          position: { lat: z.lat, lng: z.lng },
          map: mapInstance,
          title: z.name,
          icon: z.icon
        });
      }
    } else if (z.type === "polygon") {
      new google.maps.Polygon({
        map: mapInstance,
        paths: z.points,
        strokeColor: "#ff7f50",
        strokeOpacity: 0.9,
        strokeWeight: 2,
        fillColor: "#ff7f50",
        fillOpacity: 0.15
      });

      if (z.icon) {
        const c = polygonCentroid(z.points);
        new google.maps.Marker({
          position: c,
          map: mapInstance,
          title: z.name,
          icon: z.icon
        });
      }
    }
  });
}

function drawPathsOnMap(mapInstance) {
  if (!window.google || !google.maps) return;

  paths.forEach(p => {
    new google.maps.Polyline({
      path: p.path,
      geodesic: true,
      strokeColor: "#2e8b57",
      strokeOpacity: 1.0,
      strokeWeight: 3,
      map: mapInstance
    });

    // Ajoute les flèches directionnelles
    addDirectionIcons(p.path, mapInstance);
  });
}

function initMap() {
  if (!window.google || !google.maps) {
    console.error("[GTS] Google Maps n'a pas chargé !");
    return;
  }

  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 48.25, lng: -1.05 },
    zoom: 12,
    mapTypeId: "roadmap"
  });

  // Dessins
  drawZonesOnMap(map);
  drawPathsOnMap(map);

  // Info : geometry ?
  if (!google.maps.geometry) {
    console.warn("[GTS] Tip : ajoute &libraries=geometry à l'URL du SDK pour activer les flèches.");
  }
}

/* ============================
   ALERTES SONORES
   ============================ */
function playAlertForZone(z) {
  // Son spécifique de la zone si défini
  if (z && z.sound) {
    try {
      const a = new Audio(z.sound);
      a.play().catch(() => {/* autoplay bloqué, on ignore */});
      return;
    } catch (_) { /* ignore */ }
  }
  // Fallback élément audio global
  const el = document.getElementById("alertSound");
  if (el) {
    el.play().catch(() => {/* ignore */});
  }
}

/* ============================
   TRACKING GPS
   ============================ */
function startTracking() {
  const status      = document.getElementById("status");
  const distanceBox = document.getElementById("distance");
  const speedBox    = document.getElementById("speed");
  const timingBox   = document.getElementById("timing");

  if (!navigator.geolocation) {
    if (status) {
      status.textContent = "La géolocalisation n'est pas supportée.";
      status.className = "ko";
    }
    return;
  }

  if (status) { status.textContent = "Géolocalisation en cours..."; status.className = ""; }

  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      /* --- Vitesse --- */
      const s = pos.coords.speed; // m/s (peut être null)
      if (s === null) {
        if (speedBox) speedBox.textContent = "-- km/h";
      } else {
        const kmh = smoothSpeed(s) * 3.6;
        if (speedBox) {
          speedBox.textContent = `${kmh.toFixed(0)} km/h`;
          if (kmh < 50)      speedBox.style.color = "#0a7a0a";
          else if (kmh < 80) speedBox.style.color = "#e6a800";
          else               speedBox.style.color = "#a30000";
        }
      }

      /* --- Détection zones --- */
      let insideZone  = null;
      let closestZone = null;
      let minDist     = Infinity;

      for (const z of zones) {
        if (z.type === "circle") {
          const d = distanceMeters(lat, lng, z.lat, z.lng);
          if (d < minDist) { minDist = d; closestZone = z; }
          if (d <= z.radius) insideZone = z;
        } else if (z.type === "polygon") {
          const c = polygonCentroid(z.points);
          const d = distanceMeters(lat, lng, c.lat, c.lng);
          if (d < minDist) { minDist = d; closestZone = z; }
          if (isPointInPolygon(lat, lng, z.points)) insideZone = z;
        }
      }

      if (distanceBox && closestZone) {
        distanceBox.textContent = `${closestZone.name} : ${Math.round(minDist)} m`;
      }

      /* --- État / Messages --- */
      if (insideZone) {
        // Nouvelle entrée dans la zone (détection sens d’arrivée)
        if (lastZoneName !== insideZone.name && lastPos) {
          const b   = bearing(lastPos.lat, lastPos.lng, lat, lng);
          const dir = bearingToText(b);

          if (status) {
            status.innerHTML = `Arrivée dans <strong>${insideZone.name}</strong> depuis le <span class="dir-text">${dir}</span>`;
            status.className = "ok";
          }

          const dirIcon = (insideZone.directionIcons && insideZone.directionIcons[dir])
            ? insideZone.directionIcons[dir]
            : (insideZone.icon || "images/none.png");

          setIconBox(dirIcon, dir);

          playAlertForZone(insideZone);

          if (arrivalTimeoutId) clearTimeout(arrivalTimeoutId);
          arrivalTimeoutId = setTimeout(() => {
            lastZoneName = insideZone.name;
          }, 2000); // stabilisation (2 s)

        } else {
          // Zone stabilisée
          if (lastZoneName === insideZone.name) {
            if (status) { status.textContent = `Vous êtes sur ${insideZone.name}`; status.className = "ok"; }
            setIconBox(insideZone.icon || "images/none.png", insideZone.name);
          }
        }

        // Horaire prévu ?
        if (timingBox) {
          if (insideZone.expectedTime) {
            const timing = getTimingStatus(insideZone.expectedTime);
            if (timing.status === "en avance") {
              timingBox.textContent = `En avance de ${timing.minutes} min`;
              timingBox.style.color = "green";
            } else if (timing.status === "en retard") {
              timingBox.textContent = `En retard de ${timing.minutes} min`;
              timingBox.style.color = "red";
            } else {
              timingBox.textContent = "À l'heure";
              timingBox.style.color = "orange";
            }
          } else {
            timingBox.textContent = "Statut horaire : --";
            timingBox.style.color = "white";
          }
        }

      } else {
        // Hors zone
        if (status) { status.textContent = "Vous êtes hors zone"; status.className = "ko"; }
        setIconBox("images/none.png", "Aucun");
        if (timingBox) { timingBox.textContent = "Statut horaire : --"; timingBox.style.color = "white"; }
        lastZoneName = null;
      }

      // Mémorise la position pour le prochain bearing
      lastPos = { lat, lng };
    },
    (err) => {
      const status = document.getElementById("status");
      if (status) {
        status.textContent = "Erreur : " + err.message;
        status.className = "ko";
      }
    },
    { enableHighAccuracy: true, maximumAge: 400, timeout: 5000 }
  );
}

function stopTracking() {
  const status = document.getElementById("status");
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
    if (status) { status.textContent = "Géolocalisation arrêtée."; status.className = "ko"; }
  }
}

/* ============================
   SERVICE WORKER (optionnel)
   ============================ */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js").catch(() => {});
}

/* ============================
   EXPORTS GLOBAUX
   ============================ */
window.initMap = initMap;
window.startTracking = startTracking;
window.stopTracking  = stopTracking;
window.toggleNightMode = toggleNightMode;
