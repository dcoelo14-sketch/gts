<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>GTS – Mobile (virages à 20s, sans carte)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111" />
  <style>
    :root {
      --ok: #0a7a0a; --ko: #b00020; --fg: #111; --bg: #fff; --fg-night: #eee; --bg-night: #111;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg); background: var(--bg);
      display: flex; flex-direction: column;
    }
    .night { color: var(--fg-night); background: var(--bg-night); }
    header { padding: 10px 14px; font-weight: 600; }
    .panel { padding: 10px 14px; display: grid; grid-template-columns: 1fr; gap: 6px; }
    .row { font-size: 16px; line-height: 1.3; }
    .ok { color: var(--ok); font-weight: 700; }
    .ko { color: var(--ko); font-weight: 700; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; padding: 8px 14px; }
    button {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #0078ff;
      color: white;
      cursor: pointer;
    }
   /* .night button { background: #1e1e1e; color: #eee; border-color: #333; }*/
    .icon-wrap {
      flex: 1 1 auto;
      display:flex; align-items:center; justify-content:center;
      padding: 8px 14px;
    }
    #icon {
      display: block;
      height: min(42vh, 280px);
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
    }
    footer { padding: 10px 14px; color:#666; font-size: 13px; }
    .night footer { color:#aaa; }
    #next, #speed, #status { font-size: 30px; }
    * { -webkit-tap-highlight-color: transparent; user-select: none; }
  </style>
</head>
	<body onload="document.body.classList.add('night')">
<body>
  <header>GTS – Mobile (virages à 20 s)</header>

  <div class="panel">
    <div class="row"><strong id="wsState">GPS natif</strong></div>
    <div class="row">Statut : <span id="status" class="ko">En attente…</span></div>
    <div class="row">Vitesse : <strong><span id="speed">-- km/h</span></strong></div>
    <div class="row">Prochain : <strong><span id="next">—</span></strong></div>
  </div>

  <div class="icon-wrap">
    <img id="icon" src="images/droit.png" alt="Direction">
  </div>

  <div class="controls">
    <button onclick="startTracking()">Démarrer</button>
    <button onclick="stopTracking()">Arrêter</button>
    <button onclick="toggleNight()">Mode nuit</button>
  </div>

  <footer>Sans carte, uniquement paths &amp; virages. Lookahead robuste, anti‑clignotement.</footer>

 <script>
/* ============================================================
   UI HELPERS
============================================================ */

const qs = (sel) => document.querySelector(sel);

function setIcon(src) { qs('#icon').src = src; }

function setStatus(txt, cls) {
    const el = qs('#status');
    el.textContent = txt;
    el.className = cls === "ok" ? "ok" : "ko";
}

function setSpeed(kmh) {
    qs('#speed').textContent =
        isFinite(kmh) ? `${kmh.toFixed(0)} km/h` : "-- km/h";
}

function toggleNight() {
    document.body.classList.toggle('night');
}

/* ============================================================
   GEO UTILS
============================================================ */

const DEG = Math.PI / 180;
const R   = 6371000;

function distanceMeters(lat1, lon1, lat2, lon2) {
    const dLat = (lat2 - lat1) * DEG;
    const dLon = (lon2 - lon1) * DEG;

    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(lat1*DEG) * Math.cos(lat2*DEG) *
        Math.sin(dLon/2)**2;

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function bearing(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * DEG;
    const l1 = lat1 * DEG;
    const l2 = lat2 * DEG;

    const y = Math.sin(dLon) * Math.cos(l2);
    const x =
        Math.cos(l1)*Math.sin(l2) -
        Math.sin(l1)*Math.cos(l2)*Math.cos(dLon);

    return (Math.atan2(y,x) * 180/Math.PI + 360) % 360;
}

/* ============================================================
   CIRCLE ENGINE PRO v3
============================================================ */

/*
  FORMAT A
  const circles = [
    {
      name: "rondpoint_superu",
      lat: 48.1234,
      lng: -1.2345,
      radius: 25,

      // OPTIONNEL
      entryMin: 80,
      entryMax: 160,
      exitMin : 200,
      exitMax : 260
    }
  ];
*/

const circles = [
   // === EXEMPLES, à remplacer par les tiens ===
  // { name: "rondpoint_test", lat: 48.29589, lng: -0.92670, radius: 50},
   
	 {name: "Bifurcation", lat: 48.21999, lng: -1.09198, radius: 120},
	 {name: "rond point cerf", lat: 48.29000, lng: -0.52670,  radius: 70},
	 {name: "feu", lat: 48.29694, lng: -0.93666, radius: 60},
	 {name: "Rond Point Belle Epoque", lat: 48.29768, lng: -0.93474, radius: 60},
	 {name: "rond point paris", lat: 48.29589, lng: -0.92670, radius: 50},
	 {name: "direction vitré", lat: 48.29702, lng: -0.93928, radius: 80},
	 {name: "deviation chailland", lat: 48.28065, lng: -0.96229, radius: 200},
	 {name: "deviation st pierre", lat: 48.26329, lng: -0.98710, radius: 200},
	 {name: "contour juvigne", lat: 48.24223, lng: -1.01691, radius: 200}
	 
];

/* -------- Filtre spatial anti-jitter -------- */

let filteredPos = null;

function filterPos(p) {
    if (!filteredPos) { filteredPos = p; return p; }

    const d = distanceMeters(filteredPos.lat, filteredPos.lng, p.lat, p.lng);

    if (d < 3) return filteredPos; // deadband

    filteredPos = p;
    return p;
}

/* -------- Distance centre cercle -------- */

function circleDist(c, pos) {
    return distanceMeters(c.lat, c.lng, pos.lat, pos.lng);
}

/* -------- ETA -------- */

function circleETA(c, pos, speedKmh) {
    const v = speedKmh / 3.6;
    if (v < 0.3) return Infinity;

    const d = circleDist(c,pos) - c.radius;
    return d > 0 ? d/v : 0;
}

/* -------- Direction d’entrée autorisée -------- */

function okEntryDir(c, heading) {
    if (c.entryMin==null) return true;
    const h = heading % 360;
    return (
        (c.entryMin <= c.entryMax && h >= c.entryMin && h <= c.entryMax) ||
        (c.entryMin > c.entryMax  && (h >= c.entryMin || h <= c.entryMax))
    );
}

/* -------- Direction de sortie autorisée -------- */

function okExitDir(c, heading) {
    if (c.exitMin==null) return true;
    const h = heading % 360;
    return (
        (c.exitMin <= c.exitMax && h >= c.exitMin && h <= c.exitMax) ||
        (c.exitMin > c.exitMax  && (h >= c.exitMin || h <= c.exitMax))
    );
}

/* -------- VÉRIFIE TENDANCE D’APPROCHE RÉELLE -------- */

function isApproaching(c, pos, prevPos) {
    if (!prevPos) return false;
    const d1 = circleDist(c, prevPos);
    const d2 = circleDist(c, pos);
    return d2 < d1 - 1.2; // diminution réelle > 1.2m
}

/* ============================================================
   MACHINE D’ÉTAT
============================================================ */

let state = "IDLE";
let current = null;
let suppress = { until: 0, name: null };

/* ============================================================
   GPS PROCESSING
============================================================ */

let lastPos = null;
let prevPos = null;
let lastFixTs = null;
let lastSpeed = 0;
let lastHeading = null;

/* ---- Lissage vitesse ---- */
function smoothSpeed(s) {
    lastSpeed = lastSpeed*0.6 + s*0.4;
    return lastSpeed;
}

/* ============================================================
   PROCESS GPS
============================================================ */

function processGps(gps) {

    /* --- heading --- */
    if (isFinite(gps.heading)) {
        lastHeading = (gps.heading + 360) % 360;
    } else if (prevPos) {
        const hdg = bearing(prevPos.lat, prevPos.lng, gps.lat, gps.lng);
        if (isFinite(hdg)) lastHeading = hdg;
    }

    /* --- vitesse --- */
    const now = Date.now();

    if (isFinite(gps.speedKmh)) {
        setSpeed(smoothSpeed(gps.speedKmh));
    } else if (lastPos && lastFixTs) {
        const dt = (now-lastFixTs)/1000;
        const d = distanceMeters(lastPos.lat,lastPos.lng,gps.lat,gps.lng);
        const v = dt>0 ? d/dt : 0;
        setSpeed(smoothSpeed(Math.min(v,80)*3.6));
    }

    prevPos   = lastPos;
    lastPos   = filterPos({ lat:gps.lat, lng:gps.lng });
    lastFixTs = now;

    const pos = lastPos;
    const vKmh = lastSpeed;
    const hdg = lastHeading ?? 0;

    /* ============================================================
       STABILISATION : ignorer si vitesse trop faible
    ============================================================ */

    if (vKmh < 1) {
        setStatus("Attente mouvement…", "ko");
        setIcon("images/droit.png");
        return;
    }

    /* ============================================================
       ÉTATS
    ============================================================ */

    if (state === "IDLE") {

        let best = null;

        for (const c of circles) {

            if (Date.now() < suppress.until && suppress.name === c.name)
                continue;

            const dist = circleDist(c,pos);
            const eta  = circleETA(c,pos,vKmh);

            if (dist < c.radius + 120 && isApproaching(c,pos,prevPos) && okEntryDir(c,hdg)) {
                if (!best || eta < best.eta)
                    best = {circle:c, dist, eta};
            }
        }

        if (best) {
            current = best.circle;
            state   = "APPROACH";

            setStatus(`Approche "${current.name}"`, "ok");
            setIcon("images/approche.png");
            qs('#next').textContent = `${Math.round(best.dist)} m • ${Math.round(best.eta)} s`;
            return;
        }

        setStatus("Aucune zone proche", "ko");
        setIcon("images/droit.png");
        qs('#next').textContent = "—";
        return;
    }

    /* ========== APPROACH ========== */

    if (state === "APPROACH") {

        const dist = circleDist(current,pos);

        if (!isApproaching(current,pos,prevPos)) {
            state = "IDLE";
            return;
        }

        if (dist <= current.radius + 5) {
            state = "ENTRY";
            setStatus(`Entrée "${current.name}"`, "ok");
            setIcon("images/entree.png");
            return;
        }

        setStatus(`Approche "${current.name}"`, "ok");
        setIcon("images/approche.png");
        qs('#next').textContent = `${Math.round(dist)} m`;
        return;
    }

    /* ========== ENTRY → INSIDE ========== */

    if (state === "ENTRY") {
        state = "INSIDE";
        setStatus(`Dans "${current.name}"`, "ok");
        setIcon("images/zone.png");
        return;
    }

    /* ========== INSIDE ========== */

    if (state === "INSIDE") {

        const dist = circleDist(current,pos);

        // vérifier éloignement réel
        const dPrev = circleDist(current, prevPos ?? pos);
        const trend = dist - dPrev;

        if (trend > 0.8 && dist > current.radius + 12 && okExitDir(current,hdg)) {

            state = "EXIT";
            setStatus(`Sortie "${current.name}"`, "ok");
            setIcon("images/sortie.png");

            suppress = {
                until: Date.now()+3000,
                name : current.name
            };

            return;
        }

        setStatus(`Dans "${current.name}"`, "ok");
        setIcon("images/zone.png");
        qs('#next').textContent = `${Math.round(dist)} m`;
        return;
    }

    /* ========== EXIT ========== */

    if (state === "EXIT") {
        state = "IDLE";
        current = null;
        qs('#next').textContent = "—";
        return;
    }
}

/* ============================================================
   GPS API
============================================================ */

let watchId = null;

function startTracking() {
    if (!navigator.geolocation) {
        setStatus("GPS non supporté", "ko");
        return;
    }

    setStatus("Acquisition GPS…", "ok");

    watchId = navigator.geolocation.watchPosition(
        (pos) => {
            processGps({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                speedKmh: pos.coords.speed != null ? pos.coords.speed*3.6 : null,
                heading: pos.coords.heading
            });
        },
        (err) => setStatus("Erreur GPS : "+err.message,"ko"),
        {enableHighAccuracy:true, maximumAge:0, timeout:10000}
    );
}

function stopTracking(){
    if (watchId!=null) navigator.geolocation.clearWatch(watchId);
    watchId=null;
    setStatus("GPS arrêté","ko");
    qs('#next').textContent="—";
    setIcon("images/droit.png");
}

</script>
</body>
</html>
