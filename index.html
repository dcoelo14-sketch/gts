<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>GTS – Mobile (virages à 20s, sans carte)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111" />
  <style>
    :root {
      --ok: #0a7a0a; --ko: #b00020; --fg: #111; --bg: #fff; --fg-night: #eee; --bg-night: #111;
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg); background: var(--bg);
      display: flex; flex-direction: column;
    }
    .night { color: var(--fg-night); background: var(--bg-night); }
    header { padding: 10px 14px; font-weight: 600; }
    .panel { padding: 10px 14px; display: grid; grid-template-columns: 1fr; gap: 6px; }
    .row { font-size: 16px; line-height: 1.3; }
    .ok { color: var(--ok); font-weight: 700; }
    .ko { color: var(--ko); font-weight: 700; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; padding: 8px 14px; }
    button {
      padding: 10px 14px; font-size: 16px;
      border-radius: 10px; border: 1px solid #ccc;
      background: #f5f5f5; color: #222;
    }
    .night button { background: #1e1e1e; color: #eee; border-color: #333; }
    .icon-wrap {
      flex: 1 1 auto;
      display:flex; align-items:center; justify-content:center;
      padding: 8px 14px;
    }
    #icon {
      display: block;
      height: min(42vh, 280px);
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
    }
    footer { padding: 10px 14px; color:#666; font-size: 13px; }
    .night footer { color:#aaa; }
    #next { font-size: 40px; }
    * { -webkit-tap-highlight-color: transparent; user-select: none; }
  </style>
</head>
<body>
  <header>GTS – Mobile (virages à 20 s)</header>

  <div class="panel">
    <div class="row"><strong id="wsState">GPS natif</strong></div>
    <div class="row">Statut : <span id="status" class="ko">En attente…</span></div>
    <div class="row">Vitesse : <span id="speed">-- km/h</span></div>
    <div class="row">Prochain : <strong><span id="next">—</span></strong></div>
  </div>

  <div class="icon-wrap">
    <img id="icon" src="images/droit.png" alt="Direction">
  </div>

  <div class="controls">
    <button onclick="startTracking()">Démarrer</button>
    <button onclick="stopTracking()">Arrêter</button>
    <button onclick="toggleNight()">Mode nuit</button>
  </div>

  <footer>Sans carte, uniquement paths &amp; virages. Lookahead robuste, anti‑clignotement.</footer>

  <script>
    /* =========================
       Helpers UI
       ========================= */
    const qs = (sel) => document.querySelector(sel);
    function setIcon(src){ qs('#icon').src = src; }
    function setStatus(txt, cls){
      const el = qs('#status');
      el.textContent = txt;
      el.className = cls === 'ok' ? 'ok' : 'ko';
    }
    function setSpeed(kmh){
      qs('#speed').textContent =
        isFinite(kmh) ? `${kmh.toFixed(0)} km/h` : '-- km/h';
    }
    function toggleNight(){ document.body.classList.toggle('night'); }

    /* =========================
       État global & paramètres
       ========================= */
    let prevPos = null;
    let lastPos = null;
    let lastSpeed = 0;
    let lastFixTs = null;
    let lastHeading = null;

    const LOOKAHEAD_SEC = 3;
    const MIN_TURN_DEG = 10;
    const PASS_EPS_M   = 5;
    const COOLDOWN_MS  = 4000;
    const MAX_SNAP_M   = 15;
    const WINDOW_M     = 50;

    let activeTurn = null;
    let suppress = { until: 0, pathName: null, index: null };

    /* =========================
       Vos PATHS (repris intégralement)
       ========================= */
    const paths = [
   {
name: "chailland",
path: [
{ lat: 48.27977, lon: -0.96363 },
{ lat: 48.28063, lon: -0.96233 },
{ lat: 48.27267, lon: -0.96288 },

{ lat: 48.25829, lon: -0.96101 },

{ lat: 48.25181, lon: -0.96271 },

]
},

path: [
{ lat: 48.26205, lon: -0.98882 },

{ lat: 48.26577, lon: -0.99448 },
{ lat: 48.26528, lon: -0.99846 },
{ lat: 48.26925, lon: -1.00935 },

{ lat: 48.27375, lon: -1.02770 }
]
},
{
name: "chatillon",
path: [
{ lat: 48.22499, lon: -1.16920 },
{ lat: 48.22548, lon: -1.17201 },
{ lat: 48.22331, lon: -1.17561 },
{ lat: 48.22350, lon: -1.17584 },
{ lat: 48.22312, lon: -1.18076 },
{ lat: 48.20759, lon: -1.18233 },
{ lat: 48.20757, lon: -1.18175 }
]
},
{
name: "radar dompierre",
path: [
{ lat: 48.26846, lon: -1.14958 },
{ lat: 48.27112, lon: -1.15124 }
]
},
{
name: "radar N12",
path: [
{ lat: 48.32492, lon: -1.09785 },
{ lat: 48.32948, lon: -1.10176 }
]
},

    ];

    /* =========================
       GÉO – Utils math / distances / cap
       ========================= */
    const getLon = (p) => (p && p.lng != null ? p.lng : p && p.lon != null ? p.lon : undefined);
    const DEG = Math.PI / 180;
    const R = 6371000;

    function distanceMeters(lat1, lon1, lat2, lon2) {
      const dLat = (lat2 - lat1) * DEG;
      const dLon = (lon2 - lon1) * DEG;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1*DEG) * Math.cos(lat2*DEG) *
                Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function bearing(lat1, lon1, lat2, lon2){
      const dLon = (lon2 - lon1) * DEG;
      lat1 *= DEG; lat2 *= DEG;
      const y = Math.sin(dLon) * Math.cos(lat2);
      const x = Math.cos(lat1)*Math.sin(lat2) -
                Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
      return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    }

    function normalize180(a) {
      return ((a + 180) % 360 + 360) % 360 - 180;
    }

    function angleDiff(a, b) {
      let d = ((a - b + 540) % 360) - 180;
      return d;
    }

    function smoothSpeed(s){
      if (s == null) return lastSpeed;
      lastSpeed = lastSpeed * 0.6 + s * 0.4;
      return lastSpeed;
    }

    function turnAngleAt(path, i) {
      if (i <= 0 || i >= path.length - 1) return 0;
      const A = path[i - 1];
      const B = path[i];
      const C = path[i + 1];
      const h1 = bearing(A.lat, getLon(A), B.lat, getLon(B));
      const h2 = bearing(B.lat, getLon(B), C.lat, getLon(C));
      return normalize180(h2 - h1);
    }

    /* ============================================================
       PathEngine — Moteur géométrique bidirectionnel
       ============================================================ */
    class PathEngine {
      static R = 6371000;
      static DEG = Math.PI / 180;

      constructor(path) {
        this.path = path;
        this.metrics = this._buildMetrics(path);
      }

      _metersBetween(A, B) {
        const lat0 = ((A.lat + B.lat) / 2) * PathEngine.DEG;
        const dx = (getLon(B) - getLon(A)) * PathEngine.DEG * Math.cos(lat0) * PathEngine.R;
        const dy = (B.lat - A.lat) * PathEngine.DEG * PathEngine.R;
        return Math.hypot(dx, dy);
      }

      _computeHeading(A, B) {
        const lat0 = ((A.lat + B.lat) / 2) * PathEngine.DEG;
        const dx = (getLon(B) - getLon(A)) * PathEngine.DEG * Math.cos(lat0) * PathEngine.R;
        const dy = (B.lat - A.lat) * PathEngine.DEG * PathEngine.R;
        return (Math.atan2(dx, dy) / PathEngine.DEG + 360) % 360;
      }

      _buildMetrics(path) {
        const segLen = [];
        const segHead = [];
        const segHeadReverse = [];
        const cumLen = [0];
        let totalLen = 0;

        for (let i = 0; i < path.length - 1; i++) {
          const A = path[i], B = path[i+1];

          const len = this._metersBetween(A, B);
          segLen.push(len);

          totalLen += len;
          cumLen.push(totalLen);

          const h = this._computeHeading(A, B);
          segHead.push(h);
          segHeadReverse.push((h + 180) % 360);
        }

        return { path, segLen, segHead, segHeadReverse, cumLen, totalLen };
      }

      project(pos) {
        const p = this.metrics.path;
        let best = { dist: Infinity, index: 0, t: 0 };

        for (let i = 0; i < p.length - 1; i++) {
          const A = p[i], B = p[i+1];

          const lat0 = A.lat * PathEngine.DEG;

          const ABx = (getLon(B) - getLon(A)) * PathEngine.DEG * Math.cos(lat0) * PathEngine.R;
          const ABy = (B.lat - A.lat) * PathEngine.DEG * PathEngine.R;

          const APx = (pos.lon - getLon(A)) * PathEngine.DEG * Math.cos(lat0) * PathEngine.R;
          const APy = (pos.lat - A.lat) * PathEngine.DEG * PathEngine.R;

          const ab2 = ABx*ABx + ABy*ABy;
          let t = ab2 > 0 ? (APx*ABx + APy*ABy) / ab2 : 0;
          t = Math.max(0, Math.min(1, t));

          const footx = ABx * t;
          const footy = ABy * t;

          const dist = Math.hypot(APx - footx, APy - footy);

          if (dist < best.dist)
            best = { dist, index: i, t };
        }

        return best;
      }

      update(pos, course) {
        const pr = this.project(pos);
        const m = this.metrics;

        const idx = pr.index;
        const absProg = m.cumLen[idx] + pr.t * m.segLen[idx];

        const forward = absProg;
        const backward = m.totalLen - absProg;
        const bidir = Math.min(forward, backward);

        const headF = m.segHead[idx];
        const headB = m.segHeadReverse[idx];

        let aligned = headF;
        if (typeof course === 'number' && isFinite(course)) {
          const diff = Math.abs(((course - headF + 540) % 360) - 180);
          aligned = diff <= 90 ? headF : headB;
        }

        return {
          index: idx,
          t: pr.t,
          dist: pr.dist,
          forwardProgress: forward,
          backwardProgress: backward,
          bidirectionalProgress: bidir,
          segHeadingAligned: aligned,
          segHeadingForward: headF,
          segHeadingBackward: headB
        };
      }
    }

    /* =========================
       Pré-calcul des métriques des paths
       ========================= */
    const pathMetrics = new Map();   // garde ta structure (cumLen/segLen/segHead)
    const pathEngines = new Map();   // moteur bidirectionnel

    function buildAllMetrics() {
      for (const seg of paths) {
        const p = seg.path;
        const segLen = [];
        const cumLen = [0];
        const segHead = [];
        let totalLen = 0;

        for (let i = 0; i < p.length - 1; i++) {
          const a = p[i];
          const b = p[i+1];
          const L = distanceMeters(a.lat, getLon(a), b.lat, getLon(b));
          segLen.push(L);
          totalLen += L;
          cumLen.push(totalLen);
          segHead.push(bearing(a.lat, getLon(a), b.lat, getLon(b)));
        }

        pathMetrics.set(seg.name, {
          path: p,
          segLen,
          cumLen,
          segHead,
          totalLen,
          name: seg.name
        });

        pathEngines.set(seg.name, new PathEngine(p));
      }
    }
    buildAllMetrics();

    /* =========================
       Projection sur un path (via PathEngine)
       ========================= */
    function projectOnPath(metrics, pos) {
      const engine = pathEngines.get(metrics.name);
      const pr = engine.update({ lat: pos.lat, lon: getLon(pos) }, lastHeading);

      return {
        progress: pr.forwardProgress,             // progression A->B (absolue)
        index: pr.index,
        t: pr.t,
        dist: pr.dist,
        segHeading: pr.segHeadingAligned          // cap aligné au sens réel si possible
      };
    }

    const turnProgressAt = (metrics, i) => metrics.cumLen[i];

    /* =========================
       Recherche du meilleur virage en fenêtre ±50 m
       ========================= */

    function lowerBound(arr, x) {
      let l=0, r=arr.length;
      while(l<r){
        const m = (l+r>>1);
        if (arr[m] < x) l = m+1;
        else r = m;
      }
      return l;
    }

    function upperBound(arr, x) {
      let l=0, r=arr.length;
      while(l<r){
        const m = (l+r>>1);
        if (arr[m] <= x) l = m+1;
        else r = m;
      }
      return l-1;
    }

    function findTurnNearProgress(metrics, targetProg, windowM, minAngleDeg, dirCoeff) {
      const { path, cumLen } = metrics;
      const n = path.length;

      const lo = Math.max(1, lowerBound(cumLen, targetProg - windowM));
      const hi = Math.min(n - 2, upperBound(cumLen, targetProg + windowM));

      let best = null;

      for (let i = lo; i <= hi; i++) {
        const ang = turnAngleAt(path, i);     // signe géométrique (droite/gauche)
        const signed = dirCoeff >= 0 ? ang : -ang;
        const absA = Math.abs(signed);
        if (absA < minAngleDeg) continue;

        const centerDist = Math.abs(cumLen[i] - targetProg);
        const score = absA - (centerDist * 0.15);

        if (!best || score > best.score)
          best = { index: i, angle: signed, centerDist, score };
      }

      return best;
    }

    function computeUpcomingTurn(pathObj,
                                 lookaheadSec = LOOKAHEAD_SEC,
                                 minAngleDeg = MIN_TURN_DEG,
                                 windowM = WINDOW_M)
    {
      if (!lastPos) return null;

      const metrics = pathMetrics.get(pathObj.name);
      if (!metrics || metrics.path.length < 3) return null;

      const v = Math.max(0, (lastSpeed || 0) / 3.6);
      if (v < 0.5) return null;

      const here = projectOnPath(metrics, lastPos);
      if (here.dist > MAX_SNAP_M) return null;

      let moveHeading = null;
      if (typeof lastHeading === 'number')
        moveHeading = lastHeading;

      // segHeading = cap de segment aligné si heading connu, sinon A->B
      const segHeading = here.segHeading;
      const dirDelta = angleDiff(moveHeading ?? segHeading, segHeading);
      const dirCoeff = Math.cos(dirDelta * DEG) >= 0 ? +1 : -1;

      const targetProg = here.progress + dirCoeff * v * lookaheadSec;

      const best =
        findTurnNearProgress(metrics,
                             targetProg,
                             windowM,
                             minAngleDeg,
                             dirCoeff);

      if (!best) return null;

      const remainingForward = (turnProgressAt(metrics, best.index) - here.progress);
      const remainingSigned = dirCoeff >= 0 ? remainingForward : -remainingForward;

      const eta = v > 0 ? Math.max(0, remainingSigned / v) : Infinity;

      const B = metrics.path[best.index];

      return {
        dir: best.angle > 0 ? 'droite' : 'gauche',
        angleDeg: Math.round(best.angle),
        distance: Math.round(Math.abs(remainingSigned)),
        etaSec: Math.round(Math.abs(eta)),
        pathName: metrics.name,
        lat: B.lat,
        lon: getLon(B),
        index: best.index,
        turnProgress: turnProgressAt(metrics, best.index),
        dirCoeff
      };
    }

    function hasPassedTurnByProgress(turn) {
      if (!turn || !lastPos) return false;
      const metrics = pathMetrics.get(turn.pathName);
      if (!metrics) return false;
      const here = projectOnPath(metrics, lastPos);

      // passage orienté selon le sens de déplacement au moment de l'annonce
      if ((turn.dirCoeff ?? +1) >= 0) {
        return here.progress > (turn.turnProgress + PASS_EPS_M);
      } else {
        return here.progress < (turn.turnProgress - PASS_EPS_M);
      }
    }

    function updateActiveTurnETA(turn) {
      const metrics = pathMetrics.get(turn.pathName);
      if (!metrics || !lastPos) return { distance: null, etaSec: null };

      const v = Math.max(0, (lastSpeed || 0) / 3.6);
      const here = projectOnPath(metrics, lastPos);
      const turnProg = turn.turnProgress ?? turnProgressAt(metrics, turn.index);

      const dir = (turn.dirCoeff ?? +1) >= 0 ? +1 : -1;
      const remainingSigned = dir >= 0 ? (turnProg - here.progress)
                                       : (here.progress - turnProg);

      const distance = Math.max(0, remainingSigned);
      const eta = v > 0 ? distance / v : Infinity;

      return {
        distance: Math.round(distance),
        etaSec: Math.round(eta)
      };
    }

    /* =========================
       GPS RÉEL – Geolocation API
       ========================= */

    let watchId = null;

    function startTracking() {
      if (!navigator.geolocation) {
        setStatus("GPS non supporté", "ko");
        return;
      }

      setStatus("Acquisition GPS…", "ok");

      watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const c = pos.coords;
          const gps = {
            lat: c.latitude,
            lon: c.longitude,
            speedKmh: c.speed != null ? c.speed * 3.6 : null,
            heading: c.heading
          };
          processGps(gps);
        },
        (err) => setStatus("Erreur GPS : " + err.message, "ko"),
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
      );
    }

    function stopTracking(){
      if (watchId !== null)
        navigator.geolocation.clearWatch(watchId);

      watchId = null;
      setStatus("GPS arrêté.","ko");
      qs('#next').textContent="—";
      setIcon("images/droit.png");
    }

    /* =========================
       processGps(gps) — logique interne
       ========================= */
    function processGps(gps) {
      // Cap (si fourni), sinon fallback via prev -> current
      if (typeof gps.heading === 'number' && isFinite(gps.heading)) {
        lastHeading = ((gps.heading % 360) + 360) % 360;
      } else if (prevPos) {
        const hdg = bearing(prevPos.lat, prevPos.lng, gps.lat, gps.lon);
        if (isFinite(hdg)) lastHeading = hdg;
      }

      // Vitesse — flux direct sinon estimation
      const now = Date.now();
      if (typeof gps.speedKmh === 'number') {
        setSpeed(smoothSpeed(gps.speedKmh));
      } else if (lastPos && lastFixTs) {
        const dt = (now - lastFixTs) / 1000;
        const d = distanceMeters(lastPos.lat, lastPos.lng, gps.lat, gps.lon);
        const vms = dt > 0 ? d / dt : 0;
        const vClamped = Math.min(vms, 80); // clamp anti pics
        setSpeed(smoothSpeed(vClamped * 3.6));
      }

      prevPos = lastPos;
      lastPos = { lat: gps.lat, lng: gps.lon };
      lastFixTs = now;

      // 1) Si virage actif -> maintenir jusqu'au passage
      if (activeTurn) {
        if (hasPassedTurnByProgress(activeTurn)) {
          setStatus(
            `Virage ${activeTurn.dir.toUpperCase()} passé sur "${activeTurn.pathName}"`,
            'ok'
          );
          setIcon('images/droit.png');
          suppress = {
            until: Date.now() + COOLDOWN_MS,
            pathName: activeTurn.pathName,
            index: activeTurn.index
          };
          activeTurn = null;
          qs('#next').textContent = '—';
          return;
        } else {
          const upd = updateActiveTurnETA(activeTurn);
          setStatus(
            `Virage ${activeTurn.dir.toUpperCase()} (~${upd.distance} m, ~${upd.etaSec} s, ${activeTurn.angleDeg}°) sur "${activeTurn.pathName}"`,
            'ok'
          );
          setIcon(activeTurn.dir === 'droite' ? 'images/droite.png' : 'images/gauche.png');
          qs('#next').textContent = `${upd.distance} m • ${upd.etaSec} s`;
          return;
        }
      }

      // 2) Pas de virage actif -> cherche le prochain
      let best = null;

      for (const p of paths) {
        const cand = computeUpcomingTurn(p, LOOKAHEAD_SEC, MIN_TURN_DEG, WINDOW_M);
        if (!cand) continue;

        const inCooldown =
          (Date.now() < suppress.until) &&
          (cand.pathName === suppress.pathName) &&
          (cand.index === suppress.index);

        if (inCooldown) continue;
        if (!best || cand.etaSec < best.etaSec) best = cand;
      }

      // Trouvé → activer le virage
      if (best) {
        activeTurn = {
          pathName: best.pathName,
          index: best.index,
          lat: best.lat,
          lon: best.lon,
          dir: best.dir,
          angleDeg: best.angleDeg,
          turnProgress: best.turnProgress,
          dirCoeff: best.dirCoeff
        };

        setStatus(
          `Virage ${best.dir.toUpperCase()} (~${best.distance} m, ~${best.etaSec} s, ${best.angleDeg}°) sur "${best.pathName}"`,
          'ok'
        );
        setIcon(best.dir === 'droite' ? 'images/droite.png' : 'images/gauche.png');
        qs('#next').textContent = `${best.distance} m • ${best.etaSec} s`;
      }

      // Aucun virage + hors route ?
      else {
        const nearAny = nearestSnapDist(lastPos) <= MAX_SNAP_M;

        if (!nearAny)
          setStatus('Hors du tracé (aucune détection)', 'ko');
        else
          setStatus('Aucun virage significatif dans 20 s', 'ko');

        setIcon('images/droit.png');
        qs('#next').textContent = '—';
      }
    }

    /* =========================
       nearestSnapDist (via PathEngine)
       ========================= */
    function nearestSnapDist(pos) {
      let best = Infinity;

      for (const [name, engine] of pathEngines) {
        const pr = engine.update({ lat: pos.lat, lon: pos.lng }, lastHeading);
        best = Math.min(best, pr.dist);
      }

      return best;
    }
  </script>
