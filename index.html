/* ============================
   ÉTAT GLOBAL
   ============================ */
let watchId=null;
let lastPos=null;
let lastSpeed=0;
let lastZone=null;

/* ============================
   OUTILS GPS
   ============================ */
function distanceMeters(lat1, lon1, lat2, lon2) {
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
           Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
           Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function bearing(lat1, lon1, lat2, lon2){
  const dLon=(lon2-lon1)*Math.PI/180;
  lat1*=Math.PI/180;
  lat2*=Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function bearingToText(b){
  if(b>=45 && b<135) return "Est";
  if(b>=135 && b<225) return "Sud";
  if(b>=225 && b<315) return "Ouest";
  return "Nord";
}

function smoothSpeed(s){
  if(s==null) return lastSpeed;
  lastSpeed=lastSpeed*0.6 + s*0.4;
  return lastSpeed;
}

/* ============================
   CALCUL DES VIRAGES SANS GOOGLE MAPS
   ============================ */

function computeTurnIcon(path) {
  if (!lastPos) return null;

  // On cherche le segment le plus proche
  let nearest=null;
  let min=Infinity;

  for (let i=0;i<path.length-1;i++){
    const p = path[i];
    const d = distanceMeters(lastPos.lat,lastPos.lng,p.lat,p.lng);
    if(d<min){min=d; nearest=i;}
  }

  // On a besoin de 3 points pour angle
  if(nearest<=0 || nearest>=path.length-1) return null;

  const A = path[nearest-1];
  const B = path[nearest];
  const C = path[nearest+1];

  const h1 = bearing(A.lat,A.lng,B.lat,B.lng);
  const h2 = bearing(B.lat,B.lng,C.lat,C.lng);

  let diff = h2 - h1;
  if (diff>180) diff-=360;
  if (diff<-180) diff+=360;

  return diff>0 ? iconRight : iconLeft;
}

/* ============================
   UI
   ============================ */
function setIcon(src){
  document.getElementById("icon").innerHTML=
    `<img src="${src}" style="height:110px">`;
}

/* ============================
   ALERTES
   ============================ */
function playAlert(zone) {
  if(zone.sound){
    new Audio(zone.sound).play().catch(()=>{});
  } else {
    document.getElementById("alertSound").play().catch(()=>{});
  }
}

/* ============================
   BOUCLE GPS
   ============================ */
function startTracking(){
  const st=document.getElementById("status");

  watchId=navigator.geolocation.watchPosition(
    pos=>{
      const lat=pos.coords.latitude;
      const lng=pos.coords.longitude;

      /* vitesse */
      const kmh = smoothSpeed(pos.coords.speed)*3.6;
      document.getElementById("speed").textContent =
        isNaN(kmh) ? "-- km/h" : kmh.toFixed(0)+" km/h";

      /* zones */
      let inside=null;
      let nearest=null;
      let best=Infinity;

      for(const z of zones){
        let d;
        if(z.type==="circle"){
          d = distanceMeters(lat,lng,z.lat,z.lng);
          if(d<best){best=d; nearest=z;}
          if(d<=z.radius) inside=z;
        }
      }

      document.getElementById("distance").textContent =
        nearest ? `${nearest.name} : ${best|0} m` : "--";

      /* entrée de zone */
      if(inside){
        if(lastZone!==inside.name && lastPos){
          const b=bearing(lastPos.lat,lastPos.lng,lat,lng);
          const dir=bearingToText(b);

          setIcon( inside.directionIcons?.[dir] || inside.icon );

          playAlert(inside);

          st.innerHTML=`Arrivée dans <b>${inside.name}</b> depuis le <b>${dir}</b>`;
          st.className="ok";

          lastZone=inside.name;
        }
        else{
          st.textContent=`Vous êtes sur ${inside.name}`;
          st.className="ok";
          setIcon(inside.icon);
        }
      }
      else{
        st.textContent="Hors zone";
        st.className="ko";
        setIcon("images/none.png");
        lastZone=null;
      }

      /* virage (PATHS) */
      for(const p of paths){
        const icon = computeTurnIcon(p.path);
        if(icon){
          setIcon(icon);
        }
      }

      lastPos={lat,lng};
    },
    err=>{
      st.textContent="Erreur GPS : "+err.message;
      st.className="ko";
    },
    { enableHighAccuracy: true, maximumAge:200, timeout:80000 }
  );


function stopTracking(){
  navigator.geolocation.clearWatch(watchId);
  document.getElementById("status").textContent="GPS arrêté.";
}

/* ============================
   MODE NUIT
   ============================ */
function toggleNightMode(){
  document.body.classList.toggle("night");
}
