/* ============================================================
   GEO UTILS
============================================================ */

const DEG = Math.PI / 180;
const R   = 6371000;

function distanceMeters(lat1, lon1, lat2, lon2) {
    const dLat = (lat2 - lat1) * DEG;
    const dLon = (lon2 - lon1) * DEG;

    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(lat1*DEG) * Math.cos(lat2*DEG) *
        Math.sin(dLon/2)**2;

    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function bearing(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * DEG;
    const l1 = lat1 * DEG;
    const l2 = lat2 * DEG;

    const y = Math.sin(dLon) * Math.cos(l2);
    const x =
        Math.cos(l1)*Math.sin(l2) -
        Math.sin(l1)*Math.cos(l2)*Math.cos(dLon);

    return (Math.atan2(y,x) * 180/Math.PI + 360) % 360;
}

/* -------- Filtre spatial anti-jitter -------- */

let filteredPos = null;

function filterPos(p) {
    if (!filteredPos) { filteredPos = p; return p; }

    const d = distanceMeters(filteredPos.lat, filteredPos.lng, p.lat, p.lng);

    if (d < 3) return filteredPos; // deadband

    filteredPos = p;
    return p;
}

/* -------- Distance centre cercle -------- */

function circleDist(c, pos) {
    return distanceMeters(c.lat, c.lng, pos.lat, pos.lng);
}

/* -------- ETA -------- */

function circleETA(c, pos, speedKmh) {
    const v = speedKmh / 3.6;
    if (v < 0.3) return Infinity;

    const d = circleDist(c,pos) - c.radius;
    return d > 0 ? d/v : 0;
}

/* -------- Directions d’entrée/sortie (fenêtres simples) -------- */

function okEntryDir(c, heading) {
    if (c.entryMin==null) return true;
    const h = ((heading % 360) + 360) % 360;
    return (
        (c.entryMin <= c.entryMax && h >= c.entryMin && h <= c.entryMax) ||
        (c.entryMin >  c.entryMax && (h >= c.entryMin || h <= c.entryMax))
    );
}

function okExitDir(c, heading) {
    if (c.exitMin==null) return true;
    const h = ((heading % 360) + 360) % 360;
    return (
        (c.exitMin <= c.exitMax && h >= c.exitMin && h <= c.exitMax) ||
        (c.exitMin >  c.exitMax && (h >= c.exitMin || h <= c.exitMax))
    );
}

/* -------- Tendance d’approche réelle -------- */

function isApproaching(c, pos, prevPos) {
    if (!prevPos) return false;
    const d1 = circleDist(c, prevPos);
    const d2 = circleDist(c, pos);
    return d2 < d1 - 1.2; // diminution réelle > 1.2m
}

/* ===== Sticky INSIDE par rapport au sens d’arrivée (Option 1) ===== */

// Mémoire du secteur d’entrée utilisé (si détecté)
let circArrivalEntry = null;   // { min, max, icon } ou null

// Résolution d'icône : accepte "droite" → "images/droite.png",
// "images/xx.svg" → inchangé, URL absolue → inchangé
const ICON_BASE = "images";
const ICON_EXT  = ".png";
function iconPath(nameOrPath) {
  if (!nameOrPath) return null;
  if (/^(https?:)?\/\//i.test(nameOrPath) || /^data:/i.test(nameOrPath)) return nameOrPath;
  if (nameOrPath.includes("/")) return /\.[a-z0-9]+$/i.test(nameOrPath) ? nameOrPath : `${nameOrPath}${ICON_EXT}`;
  const hasExt = /\.[a-z0-9]+$/i.test(nameOrPath);
  const file = hasExt ? nameOrPath : `${nameOrPath}${ICON_EXT}`;
  return `${ICON_BASE}/${file}`;
}

// Compare un heading à une fenêtre [min,max] (gère le wrap autour de 0°)
function inSector(h, min, max) {
  h = ((h % 360) + 360) % 360;
  if (min <= max) return h >= min && h <= max;
  return (h >= min || h <= max); // traverse 0°
}

/**
 * Retourne le "secteur d’entrée" qui matche :
 * - si c.entries existe : renvoie le premier secteur {min,max,icon} qui correspond au heading
 * - sinon si c.entryMin/entryMax existent et okEntryDir est vrai : renvoie un secteur synthétique
 * - sinon null
 */
function getMatchedEntryForCircle(c, heading) {
  if (Array.isArray(c.entries) && c.entries.length) {
    const h = ((heading % 360) + 360) % 360;
    for (const e of c.entries) {
      if (inSector(h, e.min, e.max)) return e; // e peut contenir e.icon
    }
    return null;
  }
  if (c.entryMin != null && c.entryMax != null && okEntryDir(c, heading)) {
    // Secteur synthétique basé sur la fenêtre simple (icon fallback = iconEntry si défini)
    return { min: c.entryMin, max: c.entryMax, icon: c.iconEntry || null };
  }
  return null;
}

/* ============================================================

============================================================ */

/* ============================================================
   GPS PROCESSING
============================================================ */

let lastPos = null;
let prevPos = null;
let lastFixTs = null;
let lastSpeed = 0;
let lastHeading = null;

/* ---- Lissage vitesse ---- */
function smoothSpeed(s) {
    lastSpeed = lastSpeed*0.6 + s*0.4;
    return lastSpeed;
}

// ====== Paramètres "ENTRY dynamique" (Option 3) ======
const ENTRY_OFFSET_M = 15;     // décalage minimal en mètres au-delà du radius
const ENTRY_FACTOR_K = 1.15;   // facteur multiplicatif (ex: 1.15 = +15%)

/* ============================================================
   PROCESS GPS
============================================================ */

function processGps(gps) {

    /* --- heading --- */
    if (isFinite(gps.heading)) {
        lastHeading = ((gps.heading % 360) + 360) % 360;
    } else if (prevPos) {
        const hdg = bearing(prevPos.lat, prevPos.lng, gps.lat, gps.lng);
        if (isFinite(hdg)) lastHeading = ((hdg % 360) + 360) % 360;
    }

    /* --- vitesse --- */
    const now = Date.now();

    if (isFinite(gps.speedKmh)) {
        setSpeed(smoothSpeed(gps.speedKmh));
    } else if (lastPos && lastFixTs) {
        const dt = (now-lastFixTs)/1000;
        const d = distanceMeters(lastPos.lat,lastPos.lng,gps.lat,gps.lng);
        const v = dt>0 ? d/dt : 0;
        setSpeed(smoothSpeed(Math.min(v,80)*3.6));
    }

    prevPos   = lastPos;
    lastPos   = filterPos({ lat:gps.lat, lng:gps.lng });
    lastFixTs = now;

    const pos  = lastPos;
    const vKmh = lastSpeed;
    const hdg  = lastHeading ?? 0;

    /* ============================================================
       STABILISATION : ignorer si vitesse trop faible
    ============================================================ */

    if (vKmh < 1) { // mets 3 km/h si tu veux une stabilité encore meilleure
        setStatus("Attente mouvement…", "ko");
        setIcon(iconPath("droit"));
        return;
    }

    /* ============================================================
       ÉTATS
    ============================================================ */

    // ---------------- IDLE ----------------
    if (circState === "IDLE") {

        let best = null;

        for (const c of circles) {

            if (Date.now() < suppress.until && suppress.name === c.name)
                continue;

            const dist = circleDist(c,pos);
            const eta  = circleETA(c,pos,vKmh);

            if (dist < c.radius + 120 && isApproaching(c,pos,prevPos) && okEntryDir(c,hdg)) {
                if (!best || eta < best.eta)
                    best = {circle:c, dist, eta};
            }
        }

        if (best) {
            circCurrent = best.circle;
            circState   = "APPROACH";

            // En approche, si un secteur d'entrée est identifiable, pré-affiche son icône
            const ePreview = getMatchedEntryForCircle(circCurrent, hdg);
            const approachIcon = ePreview && ePreview.icon ? iconPath(ePreview.icon) : null;

            setStatus(`Approche "${circCurrent.name}"`, "ok");
            setIcon(approachIcon || iconPath("droit"));
            const next = qs('#next'); if (next) next.textContent = `${Math.round(best.dist)} m • ${Math.round(best.eta)} s`;
            return;
        }

        setStatus("Aucune zone proche", "ko");
        setIcon(iconPath("droit"));
        const next = qs('#next'); if (next) next.textContent = "—";
        return;
    }

    // ---------------- APPROACH ----------------
    if (circState === "APPROACH") {

        const dist = circleDist(circCurrent,pos);

        if (!isApproaching(circCurrent,pos,prevPos)) {
            circState = "IDLE";
            return;
        }

        // ------ ENTRY dynamique (Option 3) ------
        const ENTRY_DISTANCE = Math.max(
          circCurrent.radius + ENTRY_OFFSET_M,
          circCurrent.radius * ENTRY_FACTOR_K
        );

        if (dist <= ENTRY_DISTANCE) {
          // Capture le secteur d’entrée réellement utilisé (si défini dans le cercle)
          circArrivalEntry = getMatchedEntryForCircle(circCurrent, hdg);

          circState = "ENTRY";

          // Icône d'entrée (secteur si dispo, sinon fallback)
          const sectorIcon = circArrivalEntry && circArrivalEntry.icon ? iconPath(circArrivalEntry.icon) : null;
          setIcon(sectorIcon || iconPath("entree"));

          setStatus(`Entrée "${circCurrent.name}"`, "ok");
          const next = qs("#next"); if (next) next.textContent = "—";
          return;
        }

        // Toujours en approche : reflète l'icône du secteur d'entrée si on peut
        const ePreview = getMatchedEntryForCircle(circCurrent, hdg);
        const approachIcon = ePreview && ePreview.icon ? iconPath(ePreview.icon) : null;

        setStatus(`Approche "${circCurrent.name}"`, "ok");
        setIcon(approachIcon || iconPath("droit"));
        const next = qs('#next'); if (next) next.textContent = `${Math.round(dist)} m`;
        return;
    }

    // ---------------- ENTRY → INSIDE ----------------
    if (circState === "ENTRY") {
        circState = "INSIDE";

        // Sticky INSIDE : icône liée au sens d’arrivée si dispo, sinon fallback iconInside / zone
        const stickyIcon = (circArrivalEntry && circArrivalEntry.icon) ? iconPath(circArrivalEntry.icon) : null;
        setIcon(stickyIcon ||iconPath(circCurrent.iconInside) || iconPath("zone")); // si tu as circCurrent.iconInside, remplace iconPath("zone") par iconPath(circCurrent.iconInside) || iconPath("zone")

        setStatus(`Dans "${circCurrent.name}"`, "ok");
        const next = qs('#next'); if (next) next.textContent = "—";
        return;
    }

    // ---------------- INSIDE ----------------
    if (circState === "INSIDE") {

        const dist  = circleDist(circCurrent,pos);

        // vérifier éloignement réel
        const dPrev = circleDist(circCurrent, prevPos ?? pos);
        const trend = dist - dPrev;

        // Sticky INSIDE : conserve l’icône du secteur d’entrée si dispo
        const stickyIcon = (circArrivalEntry && circArrivalEntry.icon) ? iconPath(circArrivalEntry.icon) : null;
        setIcon(stickyIcon || iconPath(circCurrent.iconInside)); // ou iconPath(circCurrent.iconInside) si tu le définis

        if (trend > 0.8 && dist > circCurrent.radius + 12 && okExitDir(circCurrent,hdg)) {

            // reset de la mémoire d’entrée
            circArrivalEntry = null;

            circState = "EXIT";
            setStatus(`Sortie "${circCurrent.name}"`, "ok");
            setIcon(iconPath("sortie"));

            suppress = {
                until: Date.now()+3000,
                name : circCurrent.name
            };

            return;
        }

        setStatus(`Dans "${circCurrent.name}"`, "ok");
        const next = qs('#next'); if (next) next.textContent = `${Math.round(dist)} m`;
        return;
    }

    // ---------------- EXIT ----------------
    if (circState === "EXIT") {
        circState = "IDLE";
        circCurrent = null;
        const next = qs('#next'); if (next) next.textContent = "—";
        return;
    }
}

/* ============================================================
   GPS API
============================================================ */

let watchId = null;

function startTracking() {
    if (!navigator.geolocation) {
        setStatus("GPS non supporté", "ko");
        return;
    }

    setStatus("Acquisition GPS…", "ok");

    watchId = navigator.geolocation.watchPosition(
        (pos) => {
            processGps({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                speedKmh: pos.coords.speed != null ? pos.coords.speed*3.6 : null,
                heading: pos.coords.heading
            });
        },
        (err) => setStatus("Erreur GPS : "+err.message,"ko"),
        {enableHighAccuracy:true, maximumAge:200, timeout:3000}
    );
}

function stopTracking(){
    if (watchId!=null) navigator.geolocation.clearWatch(watchId);
    watchId=null;
    setStatus("GPS arrêté","ko");
    const next = qs('#next'); if (next) next.textContent="—";
    setIcon(iconPath("droit"));
}
</script>
